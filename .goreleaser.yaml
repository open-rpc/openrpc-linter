before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - "386"
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: "386"
    main: ./main.go
    binary: openrpc-linter

archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip

changelog:
  use: git
  sort: asc
  abbrev: 7
  groups:
    - title: "Breaking Changes"
      regexp: '^.*?(\w+)(\([\w\s]+\))?!:.+$'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\([\w\s]+\))?:.+$'
      order: 1
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([\w\s]+\))?:.+$'
      order: 2
    - title: "Performance"
      regexp: '^.*?perf(\([\w\s]+\))?:.+$'
      order: 3
    - title: "Dependencies"
      regexp: '^.*?(deps|build)(\([\w\s]+\))?:.+$'
      order: 4
    - title: "Other"
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^style:'
      - '^refactor:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  github:
    owner: open-rpc
    name: openrpc-linter
  draft: false
  prerelease: auto

