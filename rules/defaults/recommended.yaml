description: "OpenRPC recommended ruleset"
rules:
  info-title:
    description: "Info must have a title."
    given: "$.info"
    severity: "error"
    then:
      field: "title"
      function: "truthy"
  info-description:
    description: "Info must have a description."
    given: "$.info"
    severity: "error"
    then:
      field: "description"
      function: "truthy"
  info-version:
    description: "Info must have a version."
    given: "$.info"
    severity: "error"
    then:
      field: "version"
      function: "truthy"
  info-license:
    description: "Info should declare a license."
    given: "$.info"
    severity: "warn"
    then:
      field: "license"
      function: "truthy"
  method-name:
    description: "Method must have a name."
    given: "$.methods[*]"
    severity: "error"
    then:
      field: "name"
      function: "truthy"
  method-summary:
    description: "Method should have a summary."
    given: "$.methods[*]"
    severity: "warn"
    then:
      field: "summary"
      function: "truthy"
  method-description:
    description: "Method must have a description."
    given: "$.methods[*]"
    severity: "error"
    then:
      field: "description"
      function: "truthy"
  method-errors:
    description: "Method must declare errors."
    given: "$.methods[*]"
    severity: "error"
    then:
      field: "errors"
      function: "truthy"
  method-examples:
    description: "Method must declare examples."
    given: "$.methods[*]"
    severity: "error"
    then:
      field: "examples"
      function: "truthy"
  param-schema:
    description: "Param must have a schema."
    given: "$.methods[*].params[*]"
    severity: "error"
    then:
      field: "schema"
      function: "truthy"
  result-description:
    description: "Result should have a description."
    given: "$.methods[*].result"
    severity: "warn"
    then:
      field: "description"
      function: "truthy"
  tag-description:
    description: "Tag should have a description."
    given: "$.methods[*].tags[*]"
    severity: "warn"
    then:
      field: "description"
      function: "truthy"
  error-description:
    description: "Error should have a description."
    given: "$.methods[*].errors[*]"
    severity: "warn"
    then:
      field: "description"
      function: "truthy"
  example-description:
    description: "Example should have a description."
    given: "$.methods[*].examples[*]"
    severity: "warn"
    then:
      field: "description"
      function: "truthy"
  schema-title:
    description: "Schema should have a title."
    given: "$..schema"
    severity: "warn"
    then:
      field: "title"
      function: "truthy"
  schema-description:
    description: "Schema should have a description."
    given: "$..schema"
    severity: "warn"
    then:
      field: "description"
      function: "truthy"
  methods-non-empty:
    description: "Document must declare at least one method."
    given: "$.methods"
    severity: "error"
    then:
      function: "schema"
      functionOptions:
        type: "array"
        minItems: 1
  method-examples-min:
    description: "Method should have at least one example."
    given: "$.methods[*].examples"
    severity: "warn"
    then:
      function: "schema"
      functionOptions:
        type: "array"
        minItems: 1
  param-count-limit:
    description: "Method should accept no more than four params."
    given: "$.methods[*].params"
    severity: "warn"
    then:
      function: "schema"
      functionOptions:
        type: "array"
        maxItems: 4
  method-summary-length:
    description: "Method summary should be 120 characters or fewer."
    given: "$.methods[*].summary"
    severity: "warn"
    then:
      function: "schema"
      functionOptions:
        type: "string"
        maxLength: 120
  param-description-length:
    description: "Param description should be 120 characters or fewer."
    given: "$.methods[*].params[*].description"
    severity: "warn"
    then:
      function: "schema"
      functionOptions:
        type: "string"
        maxLength: 120
