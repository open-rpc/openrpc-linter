description: "OpenRPC validation rules"
rules:
  methods:
    description: "OpenRPC documents should define at least one method."
    given: "$.methods"
    severity: "error"
    then:
      function: "schema"
      functionOptions:
        type: "array"
        minItems: 1
  info-title:
    description: "Info must have description. It supports markdown, and usually shows up in documentation. So make good use of it."
    given: "$.info"
    severity: "error"
    then:
      field: "description"
      function: "truthy"
  method-description:
    description: "Method must have description. It supports markdown, and usually shows up in documentation. So make good use of it."
    given: "$.methods[*]"
    severity: "error"
    then:
      field: "description"
      function: "truthy"
  method-errors:
    description: "Method must have errors."
    given: "$.methods[*]"
    severity: "error"
    then:
      field: "errors"
      function: "truthy"
  method-examples:
    description: "Method must have examples."
    given: "$.methods[*]"
    severity: "error"
    then:
      field: "examples"
      function: "truthy"
  method-min:
    description: "OpenRPC documents should define at least one method."
    given: "$.methods"
    severity: "error"
    then:
      function: "schema"
      functionOptions:
        type: "array"
        minItems: 1
  unique-method-names:
    description: "Method names must be unique."
    given: "$.methods"
    severity: "error"
    then:
      field: "name"
      function: "unique"
  unique-method-summary:
    description: "Method summaries should be unique."
    given: "$.methods"
    severity: "warn"
    then:
      field: "summary"
      function: "unique"
  unique-param-names-per-method:
    description: "Param names should be unique within each method."
    given: "$.methods[*].params"
    severity: "error"
    then:
      field: "name"
      function: "unique"
  unique-error-codes-per-method:
    description: "Error codes should be unique within each method."
    given: "$.methods[*].errors"
    severity: "error"
    then:
      field: "code"
      function: "unique"
  unique-example-names-per-method:
    description: "Example names should be unique within each method."
    given: "$.methods[*].examples"
    severity: "error"
    then:
      field: "name"
      function: "unique"
  unique-content-descriptor-names:
    description: "Content descriptor names should be unique."
    given: "$.components.contentDescriptors"
    severity: "error"
    then:
      field: "name"
      function: "unique"
  unique-schema-titles:
    description: "Schema titles should be unique."
    given: "$.components.schemas"
    severity: "error"
    then:
      field: "title"
      function: "unique"
