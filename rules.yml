description: "OpenRPC validation rules"
rules:
  methods:
    description: "OpenRPC documents should define at least one method."
    given: "$.methods"
    severity: "error"
    then:
      function: "schema"
      functionOptions:
        type: "array"
        minItems: 1
  info-title:
    description: "Info must have description. It supports markdown, and usually shows up in documentation. So make good use of it."
    given: "$.info"
    severity: "error"
    then:
      field: "description"
      function: "truthy"
  method-description:
    description: "Method must have description. It supports markdown, and usually shows up in documentation. So make good use of it."
    given: "$.methods[*]"
    severity: "error"
    then:
      field: "description"
      function: "truthy"
  method-errors:
    description: "Method must have errors."
    given: "$.methods[*]"
    severity: "error"
    then:
      field: "errors"
      function: "truthy"
  method-examples:
    description: "Method must have examples."
    given: "$.methods[*]"
    severity: "error"
    then:
      field: "examples"
      function: "truthy"
  method-min:
    description: "OpenRPC documents should define at least one method."
    given: "$.methods"
    severity: "error"
    then:
      function: "schema"
      functionOptions:
        type: "array"
        minItems: 1
